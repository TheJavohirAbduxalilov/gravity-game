<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#08090d" />
    <title>Гравитационная симуляция</title>
  </head>
  <body>
    <!-- LEFT PANEL (Figma-style Layers / Navigation) -->
    <aside class="left-panel" aria-label="Панель инструментов и тел">
      <!-- SYSTEM METRICS CARD -->
      <section class="left-section telemetry-card" id="system-telemetry" aria-label="Телеметрия системы">
        <div class="telemetry-header">Статус системы</div>
        <div class="telemetry-row">
          <span class="telemetry-label">Тел в симуляции</span>
          <strong class="telemetry-value" id="bodies-count">0</strong>
        </div>
        <div class="telemetry-row">
          <span class="telemetry-label">Кадров в секунду (FPS)</span>
          <strong class="telemetry-value" id="fps-value">0</strong>
        </div>
      </section>

      <!-- SEARCH BOX -->
      <section class="left-section search-section" aria-label="Поиск тел">
        <div class="search-bar">
          <svg class="search-icon" viewBox="0 0 24 24" width="14" height="14"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="currentColor"/></svg>
          <input type="text" id="body-search" placeholder="Поиск тела..." autocomplete="off">
        </div>
      </section>

      <!-- TELEMETRY PANEL -->
      <section class="left-section telemetry-panel" aria-label="Телеметрия тел">
        <div class="sidebar-header">
          <h2>Список тел</h2>
        </div>
        
        
        <div class="bodies-list" id="bodies-list"></div>
        <div class="empty-bodies" id="empty-bodies"></div>
      </section>
    </aside>

    <!-- CENTER SIMULATION VIEWPORT -->
    <main class="app-shell">
      <section class="simulation" aria-label="Симуляция гравитации">
        <!-- COMPACT TOP COMMAND BAR -->
        <div class="command-bar">
          <div class="command-group command-tools" aria-label="Инструменты">
            <button class="tool-btn is-active" id="btn-tool-create" type="button" aria-label="Создать" title="Режим создания">
              <svg viewBox="0 0 24 24" width="14" height="14"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z" fill="currentColor"/></svg>
              <span>Создать</span>
            </button>
            <button class="tool-btn" id="btn-tool-select" type="button" aria-label="Выбрать" title="Режим выбора">
              <svg viewBox="0 0 24 24" width="14" height="14"><path d="M9 3.88l-1.34 1.34L11.54 9H4v2h7.54l-3.88 3.88L9 16.22 15.22 10zM19 19H5v2h14v-2z" fill="currentColor"/></svg>
              <span>Выбрать</span>
            </button>
          </div>

          <div class="command-group" aria-label="Симуляция">
            <button class="tool-btn" id="pause-button" type="button" aria-label="Пауза" title="Пауза/Возобновить">
              <svg viewBox="0 0 24 24" width="14" height="14" class="play-icon"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
              <span class="pause-text">Пауза</span>
            </button>
          </div>

          <div class="command-group toolbar-control-group" aria-label="Скорость времени">
            <span class="toolbar-label">Скорость</span>
            <button class="step-btn" id="timescale-dec" type="button" title="Замедлить">−</button>
            <strong class="value-display" id="timescale-value">1.0x</strong>
            <button class="step-btn" id="timescale-inc" type="button" title="Ускорить">+</button>
          </div>

          <div class="command-group toolbar-control-group" aria-label="Масштаб">
            <span class="toolbar-label">Масштаб</span>
            <button class="step-btn" id="zoom-dec" type="button" title="Отдалить">−</button>
            <strong class="value-display" id="zoom-value">1.00x</strong>
            <button class="step-btn" id="zoom-inc" type="button" title="Приблизить">+</button>
          </div>

          <div class="command-spacer"></div>
          <div class="command-readout">
            <span class="toolbar-label">Камера</span>
            <strong class="value-display" id="camera-coords">0, 0</strong>
          </div>
        </div>

        <div class="canvas-stage">
          <canvas id="space-canvas"></canvas>
          <canvas id="overlay-canvas"></canvas>
        </div>
      </section>
    </main>

    <!-- RIGHT PANEL (Figma-style Properties) -->
    <aside class="sidebar" aria-label="Тела симуляции">
      <!-- CONSTRUCTOR PANEL -->
      <section class="sidebar-section creation-panel" aria-label="Параметры создания">
        <h2 class="sidebar-title">Создание тел</h2>
        
        <div class="control-group">
          <label for="creation-mode">Режим создания</label>
          <select id="creation-mode">
            <option value="dynamic">Динамический рост</option>
            <option value="fixed">Фиксированные слайдеры</option>
          </select>
        </div>
 
        <div class="control-group" id="fixed-controls" style="display: none;">
          <div class="slider-field">
            <div class="slider-header">
              <label for="spawn-mass">Масса: <span id="mass-preview">100</span></label>
            </div>
            <input type="range" id="spawn-mass" min="1" max="1000" step="1" value="400">
          </div>
        </div>
      </section>

      <!-- INSPECTOR PANEL -->
      <section class="sidebar-section inspect-panel" id="inspect-panel" aria-label="Свойства тела">
        <h2 class="sidebar-title">Свойства тела</h2>
        <div id="inspect-content">
          <div class="inspect-placeholder">Выберите тело на карте или в списке слева для просмотра свойств</div>
        </div>
      </section>
    </aside>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
